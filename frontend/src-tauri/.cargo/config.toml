[target.aarch64-apple-darwin]
rustflags = [
    "-C", "link-arg=-mmacosx-version-min=14.2",
]

[target.x86_64-apple-darwin]
rustflags = [
    "-C", "link-arg=-mmacosx-version-min=14.2",
]

# Force dynamic CRT (/MD) on Windows MSVC to match whisper-rs-sys cmake objects.
# Without this, cc-compiled esaxx-rs objects default to /MT (static CRT), causing
# LNK2038 RuntimeLibrary mismatch when linking the test binary.
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=-crt-static"]

[env]
MACOSX_DEPLOYMENT_TARGET = { value = "14.2", force = true }
CMAKE_OSX_DEPLOYMENT_TARGET = "14.2"